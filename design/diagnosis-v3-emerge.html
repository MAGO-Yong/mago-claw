<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排障助手 · 渐进浮现</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --surface: #181b25;
  --surface2: #1e2130;
  --border: #262a3a;
  --border2: #303450;
  --text: #dde3ee;
  --text-muted: #55607a;
  --text-dim: #8b97b0;
  --accent: #6366f1;
  --accent-soft: rgba(99,102,241,0.10);
  --green: #10b981;
  --green-soft: rgba(16,185,129,0.09);
  --red: #ef4444;
  --yellow: #f59e0b;
  --yellow-soft: rgba(245,158,11,0.09);
}

body {
  font-family: -apple-system, 'SF Pro Text', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Topbar ── */
.topbar {
  height: 42px;
  display: flex; align-items: center;
  padding: 0 20px; gap: 10px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.topbar-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}
.topbar-name { font-size: 13px; font-weight: 600; color: var(--text-dim); }
.topbar-tag {
  font-size: 11px; color: var(--text-muted);
  background: var(--surface2); border: 1px solid var(--border2);
  padding: 2px 8px; border-radius: 4px;
}
.topbar-r { margin-left: auto; font-size: 11.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

/* ── Scroll ── */
.scroll-area {
  flex: 1; overflow-y: auto;
  padding: 32px 0 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.scroll-area::-webkit-scrollbar { width: 3px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.messages {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex; flex-direction: column; gap: 0;
}

/* ── Message rows ── */
.msg-row {
  display: flex; gap: 12px;
  padding: 6px 0;
  opacity: 0;
  transform: translateY(8px);
  animation: fadeUp 0.35s ease forwards;
}
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.user { flex-direction: row-reverse; }

.avatar {
  width: 26px; height: 26px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-top: 2px;
}
.avatar.ai { background: linear-gradient(135deg,#6366f1,#a855f7); }
.avatar.user { background: var(--surface2); border: 1px solid var(--border2); font-size: 11px; }

.msg-content { flex: 1; min-width: 0; max-width: 88%; }
.msg-row.user .msg-content { display: flex; flex-direction: column; align-items: flex-end; }

.msg-name {
  font-size: 11px; color: var(--text-muted); font-weight: 500;
  margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
}
.msg-time { color: var(--border2); }

/* User bubble */
.user-bubble {
  background: var(--accent);
  color: #fff; padding: 9px 14px;
  border-radius: 14px 14px 3px 14px;
  font-size: 14px; line-height: 1.6;
  display: inline-block; max-width: 100%;
}

/* AI text — plain prose */
.ai-text {
  font-size: 14px; line-height: 1.8; color: var(--text);
}
.ai-text p { margin-bottom: 8px; }
.ai-text p:last-child { margin-bottom: 0; }
.ai-text strong { color: #fff; font-weight: 600; }
.hl { color: var(--accent); }
.hl-g { color: var(--green); }
.hl-y { color: var(--yellow); }

/* inline code tag */
.tag-inline {
  display: inline-block;
  font-size: 12px; padding: 1px 7px; border-radius: 4px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text-dim); font-family: 'SF Mono', monospace;
  vertical-align: middle; margin: 0 2px;
}

/* ── Typing indicator ── */
.typing-dots {
  display: flex; gap: 4px; padding: 10px 0 4px;
}
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted);
  animation: bounce 1.1s ease infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* ── Stream text cursor ── */
.cursor {
  display: inline-block; width: 2px; height: 14px;
  background: var(--accent); margin-left: 1px;
  vertical-align: middle;
  animation: blink 0.9s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Divider with label ── */
.divider {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 0 8px;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.1s forwards;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* ═══════════════════════════════════════
   FLOW DIAGRAM — emerges from bottom
═══════════════════════════════════════ */
.flow-emerge-wrap {
  max-width: 640px; margin: 0 auto; padding: 0 20px 12px;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.22,1,0.36,1);
}
.flow-emerge-wrap.visible {
  opacity: 1; transform: translateY(0);
}

.flow-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: visible;
  position: relative;
}

/* grow animation on border */
.flow-card::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(99,102,241,0.4), rgba(168,85,247,0.2), transparent 60%);
  opacity: 0;
  transition: opacity 1s ease 0.3s;
  pointer-events: none;
}
.flow-emerge-wrap.visible .flow-card::before { opacity: 1; }

.flow-top {
  padding: 10px 14px 0;
  display: flex; align-items: center; gap: 8px;
}
.flow-top-label {
  font-size: 11.5px; color: var(--text-muted); font-weight: 500;
}
.flow-top-hint {
  margin-left: auto; font-size: 11px; color: var(--text-muted);
  opacity: 0; transition: opacity 0.4s ease 0.8s;
  display: flex; align-items: center; gap: 4px;
}
.flow-emerge-wrap.visible .flow-top-hint { opacity: 1; }

/* Node row */
.flow-nodes {
  padding: 16px 14px 18px;
  display: flex; align-items: center;
  overflow-x: auto;
  scrollbar-width: none;
  position: relative;
}
.flow-nodes::-webkit-scrollbar { display: none; }

/* Individual node */
.fnode {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  flex-shrink: 0; position: relative;
  cursor: pointer;
  padding: 8px 10px;
  border-radius: 10px;
  transition: background 0.15s;
  /* staggered entrance */
  opacity: 0; transform: scale(0.85);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
}
.flow-emerge-wrap.visible .fnode { opacity: 1; transform: scale(1); }
.flow-emerge-wrap.visible .fnode:nth-child(1) { transition-delay: 0.15s; }
.flow-emerge-wrap.visible .fnode:nth-child(3) { transition-delay: 0.27s; }
.flow-emerge-wrap.visible .fnode:nth-child(5) { transition-delay: 0.39s; }
.flow-emerge-wrap.visible .fnode:nth-child(7) { transition-delay: 0.51s; }
.flow-emerge-wrap.visible .fnode:nth-child(9) { transition-delay: 0.63s; }

.fnode:hover { background: var(--surface2); }
.fnode.active {
  background: var(--accent-soft);
}

.fnode-box {
  width: 46px; height: 46px; border-radius: 11px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}
.fnode:hover .fnode-box {
  border-color: var(--border2);
}
.fnode.active .fnode-box {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
}
.fnode.warn .fnode-box {
  border-color: var(--yellow);
  background: var(--yellow-soft);
}

/* status dot on node */
.fnode-dot {
  position: absolute; top: -3px; right: -3px;
  width: 10px; height: 10px; border-radius: 50%;
  border: 1.5px solid var(--surface);
  opacity: 0; transform: scale(0);
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.fnode-dot.show { opacity: 1; transform: scale(1); }
.fnode-dot.ok { background: var(--green); }
.fnode-dot.warn { background: var(--yellow); }
.fnode-dot.run { background: var(--accent); animation: pulse-dot 1.2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:0.4} }

.fnode-label { font-size: 11px; font-weight: 500; color: var(--text-dim); white-space: nowrap; }
.fnode-sub { font-size: 9.5px; color: var(--text-muted); margin-top: -2px; }

/* Arrow between nodes */
.farrow {
  flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; gap: 0; padding-bottom: 22px;
  opacity: 0; transition: opacity 0.4s ease;
}
.flow-emerge-wrap.visible .farrow { opacity: 0.5; }
.farrow-line {
  width: 24px; height: 1.5px; background: var(--border2);
  position: relative;
}
.farrow-line::after {
  content: '';
  position: absolute; right: -1px; top: -3px;
  border: 3.5px solid transparent;
  border-left: 5px solid var(--border2);
}

/* ── Tooltip ── */
.node-tooltip {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  width: 220px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transform: translateY(6px) scale(0.97);
  transition: all 0.2s cubic-bezier(0.34,1,0.64,1);
}
.node-tooltip.show {
  opacity: 1; pointer-events: auto;
  transform: translateY(0) scale(1);
}
.tt-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.tt-icon { font-size: 16px; }
.tt-title { font-size: 13px; font-weight: 600; }
.tt-body { font-size: 12px; line-height: 1.6; color: var(--text-dim); }
.tt-body strong { color: var(--text); }
.tt-status {
  margin-top: 8px; font-size: 11px; display: flex; align-items: center; gap: 5px;
}
.tt-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.tt-hint {
  margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-muted); font-style: italic;
}

/* ── Skill generated card (inline, minimal) ── */
.skill-done {
  display: flex; align-items: center; gap: 10px;
  margin-top: 8px;
  background: var(--green-soft);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 9px; padding: 10px 13px;
  opacity: 0; transform: translateY(6px);
  animation: fadeUp 0.4s ease forwards;
}
.skill-done-icon { font-size: 18px; flex-shrink: 0; }
.skill-done-text { flex: 1; min-width: 0; }
.skill-done-title { font-size: 12.5px; font-weight: 600; color: var(--green); }
.skill-done-path { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'SF Mono', monospace; }

/* ── Input area ── */
.input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  max-width: 640px; margin: 0 auto; width: 100%;
}
.input-row {
  display: flex; gap: 10px; align-items: flex-end;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 12px 10px 14px;
  transition: border-color 0.2s;
}
.input-row:focus-within { border-color: var(--accent); }
.input-ta {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 14px; color: var(--text); font-family: inherit;
  resize: none; line-height: 1.6; max-height: 120px; min-height: 22px;
}
.input-ta::placeholder { color: var(--text-muted); }
.send-btn {
  width: 30px; height: 30px; border-radius: 7px; border: none;
  background: var(--accent); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.15s;
}
.send-btn:hover { opacity: 0.85; }
.input-sub {
  font-size: 11px; color: var(--text-muted); text-align: center;
  margin-top: 7px;
}

.wm {
  position: fixed; bottom: 8px; right: 16px;
  font-size: 10.5px; color: var(--text-muted);
  pointer-events: none;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-dot"></div>
  <div class="topbar-name">排障助手</div>
  <div class="topbar-tag">biz-diagnosis-creator</div>
  <div class="topbar-r" id="clock">--:--:--</div>
</div>

<div class="scroll-area" id="scrollArea">
  <div class="messages" id="messages"></div>

  <!-- Flow diagram — hidden until emerge -->
  <div class="flow-emerge-wrap" id="flowWrap">
    <div class="flow-card">
      <div class="flow-top">
        <span style="font-size:13px">🗺</span>
        <span class="flow-top-label">biz-ark-newnote-drop · 排障链路</span>
        <div class="flow-top-hint">👆 点节点可查看详情，说话可修改</div>
      </div>
      <div class="flow-nodes" id="flowNodes">

        <div class="fnode" id="fn0" onclick="showTooltip(event,'n0')">
          <div class="fnode-box">📊<div class="fnode-dot ok show" id="fd0"></div></div>
          <div class="fnode-label">大盘核实</div>
          <div class="fnode-sub">Argus</div>
        </div>

        <div class="farrow"><div class="farrow-line"></div></div>

        <div class="fnode" id="fn1" onclick="showTooltip(event,'n1')">
          <div class="fnode-box">🗂<div class="fnode-dot ok show" id="fd1"></div></div>
          <div class="fnode-label">候选池拆分</div>
          <div class="fnode-sub">新 vs 存量</div>
        </div>

        <div class="farrow"><div class="farrow-line"></div></div>

        <div class="fnode warn" id="fn2" onclick="showTooltip(event,'n2')">
          <div class="fnode-box">🔄<div class="fnode-dot warn show" id="fd2"></div></div>
          <div class="fnode-label">Recall 分析</div>
          <div class="fnode-sub">待补充接口</div>
        </div>

        <div class="farrow"><div class="farrow-line"></div></div>

        <div class="fnode" id="fn3" onclick="showTooltip(event,'n3')">
          <div class="fnode-box">⚙️<div class="fnode-dot ok show" id="fd3"></div></div>
          <div class="fnode-label">配置变更</div>
          <div class="fnode-sub">Apollo</div>
        </div>

        <div class="farrow"><div class="farrow-line"></div></div>

        <div class="fnode" id="fn4" onclick="showTooltip(event,'n4')">
          <div class="fnode-box">📋<div class="fnode-dot ok show" id="fd4"></div></div>
          <div class="fnode-label">结论输出</div>
          <div class="fnode-sub">Oncall 群</div>
        </div>

      </div>
    </div>
  </div>

  <!-- continues after diagram -->
  <div class="messages" id="messages2" style="margin-top:4px"></div>
</div>

<!-- Tooltip -->
<div class="node-tooltip" id="tooltip"></div>

<!-- Input -->
<div style="flex-shrink:0">
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-ta" id="inputTa" placeholder="继续说…" rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="userSend()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 6.5h11M7 1.5l5 5-5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-sub">Enter 发送 · Shift+Enter 换行</div>
  </div>
</div>

<div class="wm">设计稿 · v0.3 渐进浮现</div>

<script>
// Clock
setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}, 1000);

// Helpers
function $(id) { return document.getElementById(id); }
function scrollBottom(smooth) {
  const s = $('scrollArea');
  s.scrollTo({ top: s.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); userSend(); }
}

// Time helper
function nowTime() {
  const n = new Date();
  return [n.getHours(),n.getMinutes()].map(x=>String(x).padStart(2,'0')).join(':');
}

// ── Render helpers ──
function addMsg(container, role, html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const row = document.createElement('div');
      row.className = 'msg-row' + (role==='user' ? ' user' : '');
      row.style.animationDelay = '0ms';

      if (role === 'user') {
        row.innerHTML = `
          <div class="avatar user">你</div>
          <div class="msg-content">
            <div class="msg-name" style="justify-content:flex-end">马恒阳 <span class="msg-time">${nowTime()}</span></div>
            <div class="user-bubble">${html}</div>
          </div>`;
      } else {
        row.innerHTML = `
          <div class="avatar ai">🧠</div>
          <div class="msg-content">
            <div class="msg-name">排障助手 <span class="msg-time">${nowTime()}</span></div>
            <div class="ai-text">${html}</div>
          </div>`;
      }
      $(container).appendChild(row);
      scrollBottom(true);
      resolve(row);
    }, delay);
  });
}

function addDivider(label, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'divider';
      d.innerHTML = `<div class="divider-line"></div><div class="divider-label">${label}</div><div class="divider-line"></div>`;
      $('messages').appendChild(d);
      scrollBottom(true);
      resolve();
    }, delay);
  });
}

function showTyping(container) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="avatar ai">🧠</div>
    <div class="msg-content">
      <div class="msg-name">排障助手 <span class="msg-time">${nowTime()}</span></div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  $(container).appendChild(row);
  scrollBottom(true);
  return row;
}

// Stream text into existing element
function streamText(el, text, speed=22) {
  return new Promise(resolve => {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    const target = el.querySelector('.ai-text') || el;
    target.appendChild(cursor);

    // split by HTML tags to avoid breaking them
    const parts = [];
    let buf = '', inTag = false;
    for (const ch of text) {
      if (ch === '<') { if (buf) parts.push({t:'text',v:buf}); buf='<'; inTag=true; }
      else if (ch === '>' && inTag) { buf+='>'; parts.push({t:'tag',v:buf}); buf=''; inTag=false; }
      else buf += ch;
    }
    if (buf) parts.push({t:'text',v:buf});

    let pIdx=0, cIdx=0;
    function tick() {
      if (pIdx >= parts.length) { cursor.remove(); resolve(); return; }
      const part = parts[pIdx];
      if (part.t === 'tag') {
        // inject whole tag
        cursor.insertAdjacentHTML('beforebegin', part.v);
        pIdx++; cIdx=0;
        setTimeout(tick, 0);
      } else {
        if (cIdx < part.v.length) {
          cursor.insertAdjacentText('beforebegin', part.v[cIdx]);
          cIdx++;
          scrollBottom(false);
          setTimeout(tick, speed);
        } else { pIdx++; cIdx=0; setTimeout(tick,0); }
      }
    }
    tick();
  });
}

// ── Tooltip data ──
const tooltipData = {
  n0: {
    icon:'📊', title:'大盘核实',
    body:`从 <strong>Argus</strong> 拉取 24h 新笔记占比，与上周同期对比。跌超 20% 则进入下一步。`,
    status:'ok', statusText:'已配置',
    hint:'想改这个节点？直接在对话里说'
  },
  n1: {
    icon:'🗂', title:'候选池拆分',
    body:`拆分新笔记 vs 存量候选池大小，定位缩水来自哪一侧。数据源：<strong>内部 metrics 接口</strong>。`,
    status:'ok', statusText:'已配置',
    hint:'想改这个节点？直接在对话里说'
  },
  n2: {
    icon:'🔄', title:'Recall 分析',
    body:`分析 Recall 层新笔记召回率与过滤情况。<strong>metrics 接口地址未填写</strong>，需要补充。`,
    status:'warn', statusText:'待补充 metrics 接口',
    hint:'「把 Recall 节点的接口改成 http://…」'
  },
  n3: {
    icon:'⚙️', title:'配置变更核查',

let activeTooltip = null;

function showTooltip(e, nodeId) {
  e.stopPropagation();
  const data = tooltipData[nodeId];
  if (!data) return;

  const tt = $('tooltip');
  const statusColor = data.status==='ok' ? 'var(--green)' : 'var(--yellow)';

  tt.innerHTML = `
    <div class="tt-header">
      <span class="tt-icon">${data.icon}</span>
      <span class="tt-title">${data.title}</span>
    </div>
    <div class="tt-body">${data.body}</div>
    <div class="tt-status">
      <div class="tt-dot" style="background:${statusColor}"></div>
      <span style="color:${statusColor}">${data.statusText}</span>
    </div>
    <div class="tt-hint">💬 ${data.hint}</div>`;

  // Position
  const rect = e.currentTarget.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left + rect.width/2 - 110;
  // clamp
  left = Math.max(8, Math.min(left, window.innerWidth - 228));
  if (top + 180 > window.innerHeight) top = rect.top - 180;

  tt.style.top = top + 'px';
  tt.style.left = left + 'px';

  // mark active node
  document.querySelectorAll('.fnode').forEach(n => n.classList.remove('active'));
  e.currentTarget.classList.add('active');

  tt.classList.add('show');
  activeTooltip = nodeId;
}

document.addEventListener('click', (e) => {
  if (!$('tooltip').contains(e.target) && !e.target.closest('.fnode')) {
    $('tooltip').classList.remove('show');
    document.querySelectorAll('.fnode').forEach(n => n.classList.remove('active'));
    activeTooltip = null;
  }
});
